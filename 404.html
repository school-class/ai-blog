<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Page Not Found</title>
    <link rel="stylesheet" href="style.css">
        <style>
        /* ベースのスタイル */
body {
    margin: 0;
    padding: 0;
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
    background-color: #0b0f19;
    color: #f3f4f6;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

.container {
    max-width: 600px;
    padding: 20px;
}

/* 404の数字を大きく、少しグラデーションで */
.error-code {
    font-size: clamp(6rem, 15vw, 10rem);
    font-weight: 900;
    margin: 0;
    line-height: 1;
    background: linear-gradient(45deg, #6366f1, #a855f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.05em;
}

/* メッセージ */
.error-message {
    font-size: 1.5rem;
    font-weight: 700;
    margin-top: 20px;
    margin-bottom: 10px;
}

.error-description {
    font-size: 0.95rem;
    color: #9ca3af;
    line-height: 1.6;
    margin-bottom: 40px;
}

/* おしゃれなアニメーション付きボタン */
.home-btn {
    display: inline-block;
    padding: 12px 32px;
    background-color: #ffffff;
    color: #0b0f19;
    text-decoration: none;
    font-weight: 600;
    border-radius: 50px;
    transition: all 0.3s ease;
    box-shadow: 0 4px 20px rgba(99, 102, 241, 0.2);
}

.home-btn:hover {
    background-color: #6366f1;
    color: #ffffff;
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(99, 102, 241, 0.4);
}
        .ad-container {
            text-align: center;
            padding-top: 30px;
            min-height: 90px;
        }
</style>
</head>
<body>
    <div class="container">
        <h1 class="error-code">404</h1>
        <p class="error-message">お探しのページは見つかりませんでした。</p>
        <p class="error-description">
            URLが変更されたか、タイピングミスの可能性があります。<br>
            下のボタンから、安全な場所へ戻りましょう。
        </p>
        <a href="/" class="home-btn">トップページへ戻る</a>
                <div class="ad-container">
            <!-- admax -->
            <script src="https://adm.shinobi.jp/s/8883b8c96c219279b7215cf3521e8aed"></script>
            <!-- admax -->
        </div>
    </div>
</body>
</html>
