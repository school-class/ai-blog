<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>満州事変と国際社会の動向クイズ</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #c0392b;
            --success-color: #27ae60;
            --error-color: #d35400;
            --bg-color: #f9f9f9;
            --card-bg: #ffffff;
            --text-color: #333333;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, var(--primary-color), #34495e);
            color: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        header h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
        }

        header p {
            margin: 0;
            font-size: 14px;
            opacity: 0.9;
        }

        .quiz-card {
            background-color: var(--card-bg);
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .question-num {
            font-weight: bold;
            color: var(--accent-color);
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 5px;
            display: block;
        }

        .question-text {
            font-size: 18px;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .options-list {
            list-style: none;
            padding: 0;
            margin: 0 0 15px 0;
        }

        .option-item {
            margin-bottom: 10px;
        }

        .option-btn {
            width: 100%;
            text-align: left;
            padding: 12px 15px;
            background-color: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.2s ease;
        }

        .option-btn:hover:not(:disabled) {
            background-color: #e9ecef;
            border-color: #ced4da;
        }

        .option-btn:disabled {
            cursor: not-allowed;
            color: #6c757d;
        }

        .option-btn.correct {
            background-color: #d4edda;
            border-color: var(--success-color);
            color: #155724;
            font-weight: bold;
        }

        .option-btn.incorrect {
            background-color: #f8d7da;
            border-color: var(--accent-color);
            color: #721c24;
        }

        .hint-block {
            margin-bottom: 15px;
        }

        .hint-btn {
            background: none;
            border: none;
            color: #7f8c8d;
            cursor: pointer;
            font-size: 13px;
            text-decoration: underline;
            padding: 0;
        }

        .hint-text {
            display: none;
            background-color: #fff3cd;
            color: #856404;
            padding: 10px;
            border-radius: 5px;
            font-size: 13px;
            margin-top: 5px;
            border-left: 4px solid #ffc107;
        }

        .result-box {
            display: none;
            margin-top: 15px;
            padding: 15px;
            border-radius: 6px;
            font-size: 14px;
        }

        .result-box.show {
            display: block;
        }

        .result-box.correct-box {
            background-color: #e2f0d9;
            color: #2c5217;
            border: 1px solid #c5e1b2;
        }

        .result-box.incorrect-box {
            background-color: #fbe5e5;
            color: #631c1c;
            border: 1px solid #f3c2c2;
        }

        .result-title {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 15px;
        }

        .score-section {
            text-align: center;
            background-color: var(--primary-color);
            color: white;
            padding: 30px;
            border-radius: 10px;
            margin-top: 30px;
            display: none;
        }

        .score-num {
            font-size: 48px;
            font-weight: bold;
            color: #f1c40f;
            margin: 10px 0;
        }

        .restart-btn {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
        }

        .submit-all-btn {
            display: block;
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }

        .submit-all-btn:hover {
            background-color: #34495e;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>満州事変と国際社会の動向クイズ</h1>
        <p>1931年の柳条湖事件から、満州国の建国、国際連盟脱退までの歴史の流れを学ぶ10問です。</p>
    </header>

    <div id="quiz-container"></div>
        <!-- admax -->
<script src="https://adm.shinobi.jp/s/899802e9af0817d105f0e1d70c0ba386"></script>
<!-- admax -->

    <button id="submit-btn" class="submit-all-btn" onclick="calculateScore()">採点する</button>

    <div id="score-section" class="score-section">
        <h2>結果発表</h2>
        <p>あなたの正解数は...</p>
        <div class="score-num" id="score-display">0 / 10</div>
        <p id="score-comment"></p>
        <button class="restart-btn" onclick="restartQuiz()">もう一度挑戦する</button>
    </div>
</div>

<script>
const quizData = [
    {
        question: "1931年9月18日、現在の中国東北部（満州）の奉天郊外で起きた、満州事変の引き金となった鉄道爆破事件を何というでしょう？",
        options: ["柳条湖（りゅうじょうこ）事件", "盧溝橋（ろこうきょう）事件", "張作霖（ちょうさくりん）爆殺事件", "済南（さいなん）事件"],
        correct: 0,
        hint: "南満州鉄道の線路が爆破された場所の名前がついた事件です。",
        rationale: "柳条湖事件が満州事変の始まりです。盧溝橋事件（1937年）は日中戦争のきっかけ、張作霖爆殺事件（1928年）はそれ以前に起きた事件です。"
    },
    {
        question: "柳条湖事件で鉄道を爆破したのは中国軍の仕業だと発表し、政府の許可を得ずに独断で軍事行動（満州事変）を開始した、現地に駐留していた日本軍を何というでしょう？",
        options: ["関東軍（かんとうぐん）", "駐那（ちゅうな）軍", "朝鮮軍", "シベリア派遣軍"],
        correct: 0,
        hint: "日本の「関東地方」と同じ漢字を書きますが、当時満州（中国東北部）の守備を担当していた部隊のことです。",
        rationale: "関東軍（日本の現地部隊）が自作自演で鉄道を爆破し、それを中国軍のせいに仕向けて一斉に攻撃を開始しました。"
    },
    {
        question: "満州事変が起きた当時、内閣を組織していた首相で、軍の行動を抑えようと「不拡大方針」を掲げたものの、関東軍の暴走を止められずに退陣した人物は誰でしょう？",
        options: ["犬養毅（いぬかいつよし）", "若槻礼次郎（わかつきれいじろう）", "浜口雄幸（はまぐちおさち）", "斎藤実（さいとうまこと）"],
        correct: 1,
        hint: "立憲民政党の首相で、第2次内閣の時にこの事変が勃発しました。",
        rationale: "若槻礼次郎内閣は事態を広げない方針（不拡大方針）をとりましたが、関東軍は無視して占領地を拡大。政府のコントロールが効かなくなってしまいました。"
    },
    {
        question: "1932年3月、関東軍は占領した地域を中国から独立させ、日本の影響下に置く新しい国を建国しました。この国の名前は何でしょう？",
        options: ["中華民国", "満州国", "蒙古政府", "南京国民政府"],
        correct: 1,
        hint: "「満州」の地に建てられた、実質的に日本が支配する傀儡（かいらい：操り人形）国家です。",
        rationale: "日本（関東軍）は、国際社会からの批判をかわすために「中国から自発的に独立した国」という形をとって「満州国」を建国させました。"
    },
    {
        question: "満州国の執政（のちに皇帝）に迎えられた、清（しん）の最後の皇帝（ラストエンペラー）だった人物は誰でしょう？",
        options: ["溥儀（ふぎ）", "袁世凱（えんせいがい）", "孫文（そんぶん）", "蒋介石（しょうかいせき）"],
        correct: 0,
        hint: "映画のモデルにもなった、清朝最後の皇帝です。",
        rationale: "関東軍は、かつて中国を支配していた清朝の最後の皇帝「溥儀」を引っ張り出してトップに据えることで、建国の正当性をアピールしようとしました。"
    },
    {
        question: "満州事変を批判する世論が高まる中、犬養毅首相が暗殺され、大正時代から続いていた「政党政治」が終わりを迎えるきっかけとなった1932年の事件は何でしょう？",
        options: ["二・二六事件", "五・一五事件", "三一五事件", "血盟団事件"],
        correct: 1,
        hint: "海軍の青年将校らが首相官邸を襲撃した、日付が名前になっている事件です。",
        rationale: "五・一五事件により犬養首相が暗殺されたことで、政党のトップが首相になる「憲政の常道」が崩れ、日本は軍部の発言力が強い政治へと変わっていきました。"
    },
    {
        question: "中国（国民政府）からの訴えを受け、満州事変の真相や満州国の実態を調査するために国際連盟が現地に派遣した調査団を、団長の名前から何というでしょう？",
        options: ["リットン調査団", "ウェルズ調査団", "ハル調査団", "マーシャル調査団"],
        correct: 0,
        hint: "イギリスの貴族（伯爵）が団長を務めました。",
        rationale: "国際連盟が派遣した「リットン調査団」は数ヶ月に及ぶ現地調査を行い、日本の自衛行動という主張を退け、満州国を認めない報告書（リットン報告書）をまとめました。"
    },
    {
        question: "国際連盟の総会でリットン報告書が審議された際、満州国を認めない勧告案に反対し、議場から退場した日本の全権（全権大使）は誰でしょう？",
        options: ["松岡洋右（まつおかようすけ）", "幣原喜重郎（しではらきじゅうろう）", "近衛文麿（このえふみまろ）", "高橋是清（たかはしこれきよ）"],
        correct: 0,
        hint: "総会で反対「1」（日本のみ）の結果となり、そのまま堂々と退場するニュース映像が有名です。",
        rationale: "松岡洋右は日本の立場を必死に弁論しましたが、賛成42、反対1（日本）、棄権1で勧告案が可決されたため、席を蹴って退場しました。"
    },
    {
        question: "国際連盟総会で満州国の存在が否定されたことを受け、日本政府が1933年3月に発表した重大な決断は何でしょう？",
        options: ["国際連盟からの脱退", "中国への宣戦布告", "ワシントン海軍軍縮条約の破棄", "日独伊三国同盟の結成"],
        correct: 0,
        hint: "国際社会のルールから離れ、日本が孤立化していく決定的な出来事です。",
        rationale: "日本は国際連盟からの脱退を通告しました（正式発効は2年後）。これにより、日本は世界の中で孤立した道を歩み始めることになります。"
    },
    {
        question: "満州事変の後、日本は満州の資源や市場を手に入れたことで一時的に不況（昭和恐慌）を脱出しました。このとき、満州を日本の経済圏に組み込んで形成された経済ブロックを何というでしょう？",
        options: ["大東亜共栄圏", "日満（にちまん）ブロック", "円（えん）ブロック", "東亜新秩序"],
        correct: 2,
        hint: "日本の通貨の単位が使われている、アジアに作った経済圏の呼び名です。",
        rationale: "欧米のブロック経済に対抗し、日本の「円」を通貨として使う地域（日本・満州・後に中国の一部）で囲い込みを行ったため「円ブロック」と呼ばれます。"
    }
];

function initQuiz() {
    const container = document.getElementById('quiz-container');
    container.innerHTML = '';
    
    quizData.forEach((q, qIdx) => {
        const card = document.createElement('div');
        card.className = 'quiz-card';
        card.id = `card-${qIdx}`;
        
        let optionsHTML = '';
        q.options.forEach((opt, oIdx) => {
            optionsHTML += `
                <li class="option-item">
                    <button class="option-btn" id="btn-${qIdx}-${oIdx}" onclick="selectOption(${qIdx}, ${oIdx})">
                        ${String.fromCharCode(65 + oIdx)}: ${opt}
                    </button>
                </li>
            `;
        });

        card.innerHTML = `
            <span class="question-num">第 ${qIdx + 1} 問</span>
            <p class="question-text">${q.question}</p>
            <div class="hint-block">
                <button class="hint-btn" onclick="toggleHint(${qIdx})">💡 ヒントを表示</button>
                <div class="hint-text" id="hint-${qIdx}">${q.hint}</div>
            </div>
            <ul class="options-list">
                ${optionsHTML}
            </ul>
            <div class="result-box" id="result-${qIdx}"></div>
        `;
        container.appendChild(card);
    });
}

let userAnswers = new Array(quizData.length).fill(null);

function selectOption(qIdx, oIdx) {
    if (document.getElementById('score-section').style.display === 'block') return;

    for (let i = 0; i < quizData[qIdx].options.length; i++) {
        const btn = document.getElementById(`btn-${qIdx}-${i}`);
        if (i === oIdx) {
            btn.style.borderColor = 'var(--primary-color)';
            btn.style.backgroundColor = '#e9ecef';
            btn.style.fontWeight = 'bold';
        } else {
            btn.style.borderColor = '#e9ecef';
            btn.style.backgroundColor = '#f8f9fa';
            btn.style.fontWeight = 'normal';
        }
    }
    userAnswers[qIdx] = oIdx;
}

function toggleHint(qIdx) {
    const hintDiv = document.getElementById(`hint-${qIdx}`);
    hintDiv.style.display = hintDiv.style.display === 'block' ? 'none' : 'block';
}

function calculateScore() {
    const unanswered = userAnswers.map((ans, idx) => ans === null ? idx + 1 : null).filter(v => v !== null);
    if (unanswered.length > 0) {
        alert(`未回答の問題があります。第 ${unanswered.join(', ')} 問に答えてください。`);
        return;
    }

    let score = 0;

    quizData.forEach((q, qIdx) => {
        const userAns = userAnswers[qIdx];
        const resultBox = document.getElementById(`result-${qIdx}`);
        
        for (let i = 0; i < q.options.length; i++) {
            document.getElementById(`btn-${qIdx}-${i}`).disabled = true;
        }

        const selectedBtn = document.getElementById(`btn-${qIdx}-${userAns}`);
        const correctBtn = document.getElementById(`btn-${qIdx}-${q.correct}`);

        if (userAns === q.correct) {
            score++;
            selectedBtn.className = 'option-btn correct';
            resultBox.className = 'result-box show correct-box';
            resultBox.innerHTML = `<div class="result-title">⭕ 正解！</div><div>${q.rationale}</div>`;
        } else {
            selectedBtn.className = 'option-btn incorrect';
            correctBtn.className = 'option-btn correct';
            resultBox.className = 'result-box show incorrect-box';
            resultBox.innerHTML = `<div class="result-title">❌ 不正解...（正解は ${String.fromCharCode(65 + q.correct)}）</div><div>${q.rationale}</div>`;
        }
    });

    document.getElementById('submit-btn').style.display = 'none';
    const scoreSection = document.getElementById('score-section');
    scoreSection.style.display = 'block';
    document.getElementById('score-display').innerText = `${score} / ${quizData.length}`;

    let comment = '';
    if (score === 10) comment = '完璧です！満州事変から国際連盟脱退までの流れを完璧に理解していますね！';
    else if (score >= 7) comment = '素晴らしい！五・一五事件やリットン調査団など、難しい用語もバッチリです。';
    else if (score >= 4) comment = 'ナイスチャレンジ。柳条湖事件と盧溝橋事件の区別など、もう一度確認してみましょう。';
    else comment = '歴史の因果関係（なぜ日本が孤立していったのか）に注目して、もう一度解いてみよう！';
    
    document.getElementById('score-comment').innerText = comment;
    scoreSection.scrollIntoView({ behavior: 'smooth' });
}

function restartQuiz() {
    userAnswers = new Array(quizData.length).fill(null);
    document.getElementById('submit-btn').style.display = 'block';
    document.getElementById('score-section').style.display = 'none';
    initQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

window.onload = initQuiz;
</script>

</body>
</html>
