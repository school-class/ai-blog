<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第一次世界大戦の歴史と国際秩序クイズ</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #16a085;
            --success-color: #27ae60;
            --error-color: #c0392b;
            --bg-color: #f5f6fa;
            --card-bg: #ffffff;
            --text-color: #2f3640;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, var(--primary-color), #243b55);
            color: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        header h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
        }

        header p {
            margin: 0;
            font-size: 14px;
            opacity: 0.9;
        }

        .quiz-card {
            background-color: var(--card-bg);
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .question-num {
            font-weight: bold;
            color: var(--accent-color);
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 5px;
            display: block;
        }

        .question-text {
            font-size: 18px;
            font-weight: bold;
            margin-top: 0;
            margin-bottom: 20px;
        }

        .options-list {
            list-style: none;
            padding: 0;
            margin: 0 0 15px 0;
        }

        .option-item {
            margin-bottom: 10px;
        }

        .option-btn {
            width: 100%;
            text-align: left;
            padding: 12px 15px;
            background-color: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            transition: all 0.2s ease;
        }

        .option-btn:hover:not(:disabled) {
            background-color: #e9ecef;
            border-color: #ced4da;
        }

        .option-btn:disabled {
            cursor: not-allowed;
            color: #6c757d;
        }

        .option-btn.correct {
            background-color: #d4edda;
            border-color: var(--success-color);
            color: #155724;
            font-weight: bold;
        }

        .option-btn.incorrect {
            background-color: #f8d7da;
            border-color: var(--error-color);
            color: #721c24;
        }

        .hint-block {
            margin-bottom: 15px;
        }

        .hint-btn {
            background: none;
            border: none;
            color: #7f8c8d;
            cursor: pointer;
            font-size: 13px;
            text-decoration: underline;
            padding: 0;
        }

        .hint-text {
            display: none;
            background-color: #fff3cd;
            color: #856404;
            padding: 10px;
            border-radius: 5px;
            font-size: 13px;
            margin-top: 5px;
            border-left: 4px solid #ffc107;
        }

        .result-box {
            display: none;
            margin-top: 15px;
            padding: 15px;
            border-radius: 6px;
            font-size: 14px;
        }

        .result-box.show {
            display: block;
        }

        .result-box.correct-box {
            background-color: #e2f0d9;
            color: #2c5217;
            border: 1px solid #c5e1b2;
        }

        .result-box.incorrect-box {
            background-color: #fbe5e5;
            color: #631c1c;
            border: 1px solid #f3c2c2;
        }

        .result-title {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 15px;
        }

        .score-section {
            text-align: center;
            background-color: var(--primary-color);
            color: white;
            padding: 30px;
            border-radius: 10px;
            margin-top: 30px;
            display: none;
        }

        .score-num {
            font-size: 48px;
            font-weight: bold;
            color: #f1c40f;
            margin: 10px 0;
        }

        .restart-btn {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
        }

        .submit-all-btn {
            display: block;
            width: 100%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }

        .submit-all-btn:hover {
            background-color: #34495e;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>第一次世界大戦の歴史と国際秩序クイズ</h1>
        <p>1914年の開戦の原因から、ヨーロッパの対立、日本の動向、そして終戦後の世界秩序までを学ぶ10問です。</p>
    </header>

    <div id="quiz-container"></div>

    <button id="submit-btn" class="submit-all-btn" onclick="calculateScore()">採点する</button>

    <div id="score-section" class="score-section">
        <h2>結果発表</h2>
        <p>あなたの正解数は...</p>
        <div class="score-num" id="score-display">0 / 10</div>
        <p id="score-comment"></p>
        <button class="restart-btn" onclick="restartQuiz()">もう一度挑戦する</button>
    </div>
</div>

<script>
const quizData = [
    {
        question: "1914年、オーストリアの皇太子夫妻がサライボ（サラエボ）でセルビア人の青年によって暗殺され、第一次世界大戦の直接の引き金となった事件を何というでしょう？",
        options: ["サラエボ事件", "バルカン事件", "オーストリア事件", "青年トルコ革命"],
        correct: 0,
        hint: "事件が起きた都市の名前がそのままつけられています。",
        rationale: "ボスニアの首都サラエボで起きたこの事件をきっかけに、オーストリアがセルビアに宣戦布告し、背後の大国が次々と参戦して大戦へと発展しました。"
    },
    {
        question: "第一次世界大戦直前のヨーロッパは、列強が2つの陣営に分かれて対立していました。イギリス・フランス・ロシアが結んでいた協力関係を何というでしょう？",
        options: ["三国同盟（さんこくどうめい）", "三国協商（さんこくきょうしょう）", "国際連盟", "日英同盟"],
        correct: 1,
        hint: "これに対して、ドイツ・オーストリア・イタリアが結んでいたのは「三国同盟」です（イタリアは後に陣営を離脱します）。",
        rationale: "イギリス・フランス・ロシアの陣営は「三国協商（または連合国）」と呼ばれ、ドイツ・オーストリアなどの「同盟国」陣営と激しく対立しました。"
    },
    {
        question: "当時、民族や宗教の対立が激しく、いつ戦争が起きてもおかしくない状態だったことから、「ヨーロッパの火薬庫」と呼ばれていた半島はどこでしょう？",
        options: ["イタリア半島", "イベリア半島", "バルカン半島", "スカンディナヴィア半島"],
        correct: 2,
        hint: "ギリシャやセルビア、ボスニアなどがある、ヨーロッパの南東部に位置する半島です。",
        rationale: "スラブ系民族とゲルマン系民族の対立、さらにオスマン帝国の衰退などが絡み合い、非常に不安定な地域だったため「ヨーロッパの火薬庫」と称されました。"
    },
    {
        question: "1914年、日本はある国との同盟を理由に、連合国側として第一次世界大戦に参戦しました。その同盟の名前は何でしょう？",
        options: ["日中共同声明", "日米安全保障条約", "日露協約", "日英同盟"],
        correct: 3,
        hint: "1902年に結ばれ、ロシアを警戒するために日本とイギリスが組んだ同盟です。",
        rationale: "日本は日英同盟の情誼（じょうぎ）を口実に参戦し、アジアにおけるドイツの拠点（中国の山東半島や太平洋の島々）を攻撃・占領しました。"
    },
    {
        question: "参戦した日本が1915年、ヨーロッパの戦争で手一杯になっている中国（袁世凱政府）に対して突きつけた、山東省のドイツ権益の継承などを認めるよう迫った要求を何というでしょう？",
        options: ["二十一カ条の要求", "下関条約", "ポルツマス条約", "満州条約"],
        correct: 0,
        hint: "数字が入った有名な要求です。これにより中国国内で激しい反日運動が起きました。",
        rationale: "欧米列強がアジアに目を向ける余裕がない隙を突き、日本が中国での権益を大幅に拡大しようとした要求です。中国はこれに激しく反発しました。"
    },
    {
        question: "大戦が長引く中、ドイツの「無制限潜水艦作戦（敵国に向かう商船は中立国のものでも沈没させる作戦）」によって自国の客船を沈められたことなどを理由に、1917年に連合国側で参戦し、戦争の決着を決定づけた大国はどこでしょう？",
        options: ["中国", "アメリカ", "日本", "イタリア"],
        correct: 1,
        hint: "それまで中立を保ち、ヨーロッパの戦争には干渉しない方針をとっていた巨大な資本主義国家です。",
        rationale: "アメリカの参戦によって連合国側の物資や兵力が圧倒的になり、消耗しきっていたドイツなどの同盟国を追い詰める決定打となりました。"
    },
    {
        question: "1917年、戦争による生活苦への不満から足元で革命（ロシア革命）が起き、世界で最初の社会主義政府を樹立して、途中で第一次世界大戦から脱落（単独講和）した国はどこでしょう？",
        options: ["ロシア", "ドイツ", "オーストリア", "オスマン帝国"],
        correct: 0,
        hint: "レーニンが指導した革命によって、のちに「ソ連」となる大国です。",
        rationale: "ロシア革命によって帝政が崩壊し、新しくできた社会主義政府は「平和に関する布告」を出して、ドイツと単独で講和条約を結んで戦争から手を引きました。"
    },
    {
        question: "1919年、連合国と敗戦国ドイツとの間で結ばれた、第一次世界大戦の講和条約（締めくくりの条約）の名前は何でしょう？",
        options: ["サンフランシスコ平和条約", "ヴェルサイユ条約", "ポーツマス条約", "パリ条約"],
        correct: 1,
        hint: "フランスのパリ郊外にある、きらびやかな大宮殿の名前がついた条約です。",
        rationale: "ヴェルサイユ条約により、ドイツはすべての植民地を失い、莫大な賠償金の支払いや軍備制限を課されました。これが後のナチス台頭の遠因となります。"
    },
    {
        question: "ヴェルサイユ条約の会議の中で、アメリカのウィルソン大統領が唱えた「十四カ条の平和原則」に基づいて、1920年に設立された史上初の政府間国際組織は何でしょう？",
        options: ["国際連盟（こくさいれんめい）", "国際連合（こくさいれんごう）", "ヨーロッパ連合（EU）", "国際オリンピック委員会"],
        correct: 0,
        hint: "「連盟」と「連合」のひっかけに注意！第二次世界大戦の『前』にできた組織です。",
        rationale: "世界平和を守るために「国際連盟」が発足しました。しかし、提唱国のアメリカが国内の反対で不参加となり、ソ連やドイツも最初は入れず、軍事的な強制力がなかったため力不足でした。"
    },
    {
        question: "第一次世界大戦後、ヴェルサイユ条約で認められた、アジアやヨーロッパの植民地・弱小民族に対して「自分たちの国の政治のあり方は、自分たちで決めてよい」とする原則を何というでしょう？",
        options: ["民族自決（みんぞくじけつ）の原則", "自由放任の原則", "主権在民の原則", "帝国主義の原則"],
        correct: 0,
        hint: "ウィルソン大統領が唱えた原則で、これに刺激されて韓国の「三・一独立運動」や中国の「五・四運動」など、アジアでアジア人のための独立・反帝国主義運動が盛んになりました。",
        rationale: "「民族自決」の原則です。ただし、当時は主にヨーロッパ内の崩壊した帝国の弱小民族に適用され、アジアの植民地にはほとんど適用されなかったため、アジアの民族運動の不満を高めました。"
    }
];

function initQuiz() {
    const container = document.getElementById('quiz-container');
    container.innerHTML = '';
    
    quizData.forEach((q, qIdx) => {
        const card = document.createElement('div');
        card.className = 'quiz-card';
        card.id = `card-${qIdx}`;
        
        let optionsHTML = '';
        q.options.forEach((opt, oIdx) => {
            optionsHTML += `
                <li class="option-item">
                    <button class="option-btn" id="btn-${qIdx}-${oIdx}" onclick="selectOption(${qIdx}, ${oIdx})">
                        ${String.fromCharCode(65 + oIdx)}: ${opt}
                    </button>
                </li>
            `;
        });

        card.innerHTML = `
            <span class="question-num">第 ${qIdx + 1} 問</span>
            <p class="question-text">${q.question}</p>
            <div class="hint-block">
                <button class="hint-btn" onclick="toggleHint(${qIdx})">💡 ヒントを表示</button>
                <div class="hint-text" id="hint-${qIdx}">${q.hint}</div>
            </div>
            <ul class="options-list">
                ${optionsHTML}
            </ul>
            <div class="result-box" id="result-${qIdx}"></div>
        `;
        container.appendChild(card);
    });
}

let userAnswers = new Array(quizData.length).fill(null);

function selectOption(qIdx, oIdx) {
    if (document.getElementById('score-section').style.display === 'block') return;

    for (let i = 0; i < quizData[qIdx].options.length; i++) {
        const btn = document.getElementById(`btn-${qIdx}-${i}`);
        if (i === oIdx) {
            btn.style.borderColor = 'var(--primary-color)';
            btn.style.backgroundColor = '#e9ecef';
            btn.style.fontWeight = 'bold';
        } else {
            btn.style.borderColor = '#e9ecef';
            btn.style.backgroundColor = '#f8f9fa';
            btn.style.fontWeight = 'normal';
        }
    }
    userAnswers[qIdx] = oIdx;
}

function toggleHint(qIdx) {
    const hintDiv = document.getElementById(`hint-${qIdx}`);
    hintDiv.style.display = hintDiv.style.display === 'block' ? 'none' : 'block';
}

function calculateScore() {
    const unanswered = userAnswers.map((ans, idx) => ans === null ? idx + 1 : null).filter(v => v !== null);
    if (unanswered.length > 0) {
        alert(`未回答の問題があります。第 ${unanswered.join(', ')} 問に答えてください。`);
        return;
    }

    let score = 0;

    quizData.forEach((q, qIdx) => {
        const userAns = userAnswers[qIdx];
        const resultBox = document.getElementById(`result-${qIdx}`);
        
        for (let i = 0; i < q.options.length; i++) {
            document.getElementById(`btn-${qIdx}-${i}`).disabled = true;
        }

        const selectedBtn = document.getElementById(`btn-${qIdx}-${userAns}`);
        const correctBtn = document.getElementById(`btn-${qIdx}-${q.correct}`);

        if (userAns === q.correct) {
            score++;
            selectedBtn.className = 'option-btn correct';
            resultBox.className = 'result-box show correct-box';
            resultBox.innerHTML = `<div class="result-title">⭕ 正解！</div><div>${q.rationale}</div>`;
        } else {
            selectedBtn.className = 'option-btn incorrect';
            correctBtn.className = 'option-btn correct';
            resultBox.className = 'result-box show incorrect-box';
            resultBox.innerHTML = `<div class="result-title">❌ 不正解...（正解は ${String.fromCharCode(65 + q.correct)}）</div><div>${q.rationale}</div>`;
        }
    });

    document.getElementById('submit-btn').style.display = 'none';
    const scoreSection = document.getElementById('score-section');
    scoreSection.style.display = 'block';
    document.getElementById('score-display').innerText = `${score} / ${quizData.length}`;

    let comment = '';
    if (score === 10) comment = '完璧です！2つの陣営の対立から戦後の平和原則まで非の打ち所がありません！';
    else if (score >= 7) comment = '素晴らしい実力です！ロシア革命やヴェルサイユ条約のポイントもしっかり押さえられています。';
    else if (score >= 4) comment = '合格点です！「国際連盟」と「国際連合」の言葉のひっかけなどに気をつけて復習してみましょう。';
    else comment = 'サラエボ事件から始まる一連の連鎖に注目して、もう一度ストーリーをおさらいしてみよう！';
    
    document.getElementById('score-comment').innerText = comment;
    scoreSection.scrollIntoView({ behavior: 'smooth' });
}

function restartQuiz() {
    userAnswers = new Array(quizData.length).fill(null);
    document.getElementById('submit-btn').style.display = 'block';
    document.getElementById('score-section').style.display = 'none';
    initQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

window.onload = initQuiz;
</script>

</body>
</html>
